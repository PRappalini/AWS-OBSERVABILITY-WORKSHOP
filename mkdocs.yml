site_name: AWS OBSERVABILITY WORKSHOP
site_description: A workshop to learn about AWS Observability services and best practices.
site_author: Pablo

theme:
  name: material
  palette:
    # Dark Mode
    - scheme: slate
      primary: black
      accent: deep orange
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    # Light Mode
    - scheme: default
      primary: blue
      accent: deep orange
      toggle:
        icon: material/weather-night
        name: Switch to dark mode

