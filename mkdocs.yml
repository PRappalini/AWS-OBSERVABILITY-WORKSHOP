      - CloudWatch Logs and log groups: "06-cloudwatch_logs_and_log_groups.md"
      - Ingestion - data sources: "07-ingestion-data_sources.md"
      - Ingestion - enablement rules: "08-ingestion-enablement_rules.md"
      - Ingestion - telemetry pipelines: "09-ingestion-telemetry_pipelines.md"
      - Logs Infrequent Access: "10-logs_infrequent_access.md"
